<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>禾渼會館｜空房查詢</title>
<style>
/* ══════════════════════════════════════
   品牌色系
   森林綠  #5A8A4A  40%
   奶茶白  #FFF8EE  30%
   渼寶粉  #F7A6B8  15%
   蜜桃橘  #FFB26B  10%
   天空藍  #7CCCF4   5%
══════════════════════════════════════ */
:root{
  /* 森林綠系 */
  --g:        #5A8A4A;
  --g-lt:     #78AA62;
  --g-pale:   #EDF6E8;
  --g-mid:    #C8E0B8;
  --g-deep:   #3A6030;

  /* 渼寶粉系 */
  --pk:       #F7A6B8;
  --pk-pale:  #FEF0F4;
  --pk-mid:   #FBCFD9;
  --pk-deep:  #C0506A;

  /* 蜜桃橘系 */
  --or:       #FFB26B;
  --or-pale:  #FFF3E6;
  --or-mid:   #FFDBB0;
  --or-deep:  #C07030;
  --or-text:  #8A4010;

  /* 天空藍系 */
  --bl:       #7CCCF4;
  --bl-pale:  #EAF7FD;
  --bl-mid:   #B8E6F8;
  --bl-deep:  #2A8AB8;

  /* 奶茶白系 */
  --cr:       #FFF8EE;
  --cr2:      #FFF3E2;
  --cr3:      #F0E8D8;
  --cr4:      #E0D0BC;

  /* 中性 */
  --gray:     #9A9088;
  --gray-lt:  #F0EDE8;
  --gray-mid: #D0C8C0;
  --text:     #2A2018;
  --text-md:  #5A4A38;
  --text-lt:  #8A7860;

  /* 圓角 */
  --r-xs: 8px;
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  background: var(--cr);
  font-family:-apple-system,'Noto Sans TC',BlinkMacSystemFont,sans-serif;
  font-size:15px;color:var(--text);
  min-height:100vh;padding-bottom:60px;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(124,204,244,.08) 0%, transparent 50%),
    radial-gradient(circle at 85% 70%, rgba(247,166,184,.07) 0%, transparent 50%);
}
.wrap{max-width:430px;margin:0 auto;padding:0 14px;}

/* ════════════════════════════════════
   HERO
════════════════════════════════════ */
.hero{
  position:relative;overflow:hidden;
  padding:28px 16px 26px 22px;
  margin-bottom:20px;
  border-radius:0 0 36px 36px;
  background: linear-gradient(160deg, #EAF6E4 0%, #FFF6E6 45%, #FEF3F7 100%);
  border-bottom: 3px solid #D8EEC8;
}
/* 右下角淡色裝飾圓 */
.hero::before{
  content:'';position:absolute;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle, rgba(90,138,74,.07), transparent 70%);
  bottom:-40px;left:-30px;
  pointer-events:none;
}
/* 橘色光暈 */
.hero::after{
  content:'';position:absolute;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle, rgba(255,178,107,.15), transparent 65%);
  bottom:-50px;right:60px;
  pointer-events:none;
}
/* 藍色小裝飾 */
.hero-deco-bl{
  position:absolute;top:18px;right:155px;
  width:22px;height:22px;border-radius:50%;
  background:rgba(124,204,244,.28);
  pointer-events:none;
}

/* 渼寶 */
.hero-meibao{
  position:absolute;right:10px;top:10px;
  width:130px;height:auto;
  object-fit:contain;pointer-events:none;
  filter:drop-shadow(2px 6px 12px rgba(60,40,10,.14));
  animation:float 3.8s ease-in-out infinite;
  z-index:2;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@media(min-width:480px){.hero-meibao{width:158px;}}

.hero-body{padding-right:142px;position:relative;z-index:3;}
@media(min-width:480px){.hero-body{padding-right:176px;}}

.hero-eyebrow{
  font-size:10px;font-weight:700;letter-spacing:2.5px;
  color:var(--g);margin-bottom:5px;margin-top:4px;
  display:flex;align-items:center;gap:5px;
  position:relative;z-index:3;
}
.hero-eyebrow::after{content:'';flex:0 0 20px;height:1.5px;background:var(--g-mid);}

.hero h1{
  font-size:27px;font-weight:800;color:var(--g-deep);
  letter-spacing:2.5px;margin-bottom:2px;
  text-shadow:0 1px 0 rgba(255,255,255,.7);
}
.hero-sub{
  font-size:12.5px;color:var(--text-md);
  font-weight:500;margin-bottom:13px;
  display:flex;align-items:center;gap:5px;
}
.hero-sub span{
  display:inline-block;width:5px;height:5px;
  border-radius:50%;background:var(--pk);
  flex-shrink:0;
}

/* 標籤三色 */
.hero-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11.5px;font-weight:600;
  padding:4px 12px;border-radius:20px;letter-spacing:.2px;
}
.ch-g{background:var(--g-pale);color:var(--g-deep);border:1px solid var(--g-mid);}
.ch-or{background:var(--or-pale);color:var(--or-text);border:1px solid var(--or-mid);}
.ch-pk{background:var(--pk-pale);color:var(--pk-deep);border:1px solid var(--pk-mid);}

/* 資訊列 */
.hero-bar{
  display:flex;align-items:stretch;
  background:rgba(255,255,255,.75);
  border-radius:var(--r-md);
  border:1.5px solid rgba(216,200,180,.4);
  overflow:hidden;margin-bottom:14px;
  backdrop-filter:blur(6px);
}
.hb-cell{flex:1;padding:9px 12px;display:flex;flex-direction:column;gap:2px;}
.hb-cell+.hb-cell{border-left:1.5px solid rgba(216,200,180,.35);}
.hb-lbl{font-size:10px;color:var(--text-lt);letter-spacing:.6px;font-weight:500;}
.hb-val{font-size:13px;font-weight:700;color:var(--text);}
.hb-val a{color:var(--g);text-decoration:none;}
.hb-note{font-size:10.5px;color:var(--text-lt);margin-top:1px;}

/* LINE 按鈕 */
.btn-line{
  display:inline-flex;align-items:center;gap:8px;
  background:#06C755;color:#fff;
  font-size:14px;font-weight:700;
  padding:10px 22px;border-radius:50px;
  text-decoration:none;border:none;cursor:pointer;
  box-shadow:0 4px 14px rgba(6,199,85,.3);
  letter-spacing:.4px;transition:transform .15s;
}
.btn-line:active{transform:scale(.97);}
.btn-line svg{width:18px;height:18px;}

/* ════════════════════════════════════
   TABS
════════════════════════════════════ */
.tabs{
  display:grid;grid-template-columns:1fr 1fr;
  background:rgba(255,255,255,.85);
  border-radius:var(--r-lg);padding:5px;
  margin:0 0 18px;
  box-shadow:0 3px 16px rgba(90,70,40,.1);
  border:1.5px solid var(--cr3);
}
.tab-btn{
  padding:11px 0;border:none;background:transparent;
  border-radius:var(--r-md);font-size:14px;font-weight:600;
  color:var(--gray);cursor:pointer;transition:all .22s;
  letter-spacing:.3px;font-family:inherit;
}
.tab-single{
  background:linear-gradient(135deg, var(--g-lt), var(--g-deep));
  color:#fff;
  box-shadow:0 3px 10px rgba(90,138,74,.3);
}
.tab-bundle{
  background:linear-gradient(135deg, #FFB26B, #E07830);
  color:#fff;
  box-shadow:0 3px 10px rgba(224,120,48,.28);
}

/* ════════════════════════════════════
   SECTION / CARD
════════════════════════════════════ */
.section{display:none;}.section.active{display:block;}

.card{
  background:#fff;
  border-radius:var(--r-lg);
  padding:20px 18px;margin-bottom:14px;
  box-shadow:0 2px 16px rgba(90,70,30,.09);
  border:1.5px solid var(--cr3);
}

.card-title{
  font-size:14px;font-weight:700;color:var(--g);
  margin-bottom:14px;display:flex;align-items:center;gap:7px;
}
.card-title svg{width:18px;height:18px;flex-shrink:0;}

/* ════════════════════════════════════
   渼寶提醒（粉色系）
════════════════════════════════════ */
.mascot-hint{
  background:linear-gradient(120deg, #FEF5F8, #FEF0F4);
  border-radius:var(--r-md);
  padding:11px 14px;margin-bottom:16px;
  border:1.5px solid var(--pk-mid);
  position:relative;overflow:hidden;
}
.mascot-hint::before{
  content:'🐾';
  position:absolute;right:12px;bottom:6px;
  font-size:22px;opacity:.18;pointer-events:none;
}
.mh-label{
  font-size:10px;font-weight:700;
  color:var(--pk-deep);letter-spacing:1px;margin-bottom:3px;
}
.mh-text{font-size:13px;color:#7A3048;line-height:1.55;}

/* ════════════════════════════════════
   FORM
════════════════════════════════════ */
label{font-size:13px;color:var(--text-md);margin-bottom:5px;display:block;font-weight:600;}
.field{margin-bottom:14px;}

input[type="date"],select{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--cr3);border-radius:var(--r-sm);
  font-size:15px;color:var(--text);background:var(--cr);
  appearance:none;-webkit-appearance:none;outline:none;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;
}
input[type="date"]:focus,select:focus{
  border-color:var(--bl);
  box-shadow:0 0 0 3px rgba(124,204,244,.18);
  background:#fff;
}

/* 天空藍 – 日期 badge */
.day-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 13px;border-radius:20px;
  font-size:12px;font-weight:600;margin-top:7px;
}
.db-wd{ background:var(--g-pale);  color:var(--g-deep);  border:1px solid var(--g-mid);}
.db-pk{ background:var(--bl-pale); color:var(--bl-deep); border:1px solid var(--bl-mid);}   /* 旺日用藍 */
.db-hd{ background:var(--or-pale); color:var(--or-text); border:1px solid var(--or-mid);}
.db-no{ background:var(--gray-lt); color:var(--gray);    border:1px solid var(--gray-mid);}

/* ════════════════════════════════════
   包棟價格表
════════════════════════════════════ */
.bpc{
  background:var(--cr);border-radius:var(--r-md);
  border:1.5px solid var(--cr3);overflow:hidden;margin-bottom:4px;
}
.bpc-head{
  font-size:12px;font-weight:700;color:var(--or-text);
  padding:9px 14px 7px;
  border-bottom:1.5px solid var(--cr3);
  background:linear-gradient(135deg, var(--or-pale), #fff3e0);
  display:flex;align-items:center;gap:5px;
}
.bpc-rows{padding:10px 14px 6px;display:flex;flex-direction:column;gap:9px;}
.bpc-row{display:flex;justify-content:space-between;align-items:center;}
.bpc-lbl{font-size:13px;color:var(--text-lt);}
.bpc-val{font-size:15px;font-weight:800;color:var(--g-deep);}
.bpc-val.pk{color:var(--bl-deep);}        /* 旺日橘→藍 */
.bpc-val.hd{color:var(--or-text);}
.bpc-note{
  font-size:11px;color:var(--or-text);
  padding:4px 14px 10px;font-weight:500;
}

/* ════════════════════════════════════
   搜尋按鈕
════════════════════════════════════ */
.btn-search{
  width:100%;padding:13px;
  background:linear-gradient(135deg, var(--g-lt), var(--g-deep));
  color:#fff;border:none;border-radius:var(--r-md);
  font-size:16px;font-weight:700;cursor:pointer;
  letter-spacing:.8px;margin-top:4px;font-family:inherit;
  box-shadow:0 4px 14px rgba(90,138,74,.28);
  transition:transform .15s,opacity .15s;
}
.btn-search:active{transform:scale(.98);opacity:.9;}
.btn-bundle{
  background:linear-gradient(135deg, #FFB26B, #D07030);
  box-shadow:0 4px 14px rgba(208,112,48,.28);
}

/* ════════════════════════════════════
   查詢結果 header
════════════════════════════════════ */
.results-hdr{
  font-size:12px;color:var(--gray);
  margin-bottom:10px;padding:0 2px;
  display:flex;align-items:center;gap:5px;
}
.results-hdr::before{
  content:'';display:inline-block;
  width:10px;height:10px;border-radius:50%;
  background:var(--bl);flex-shrink:0;      /* 藍色小點 */
}

/* 渼寶訊息 */
.mascot-msg{
  border-radius:var(--r-md);padding:11px 14px;
  margin-bottom:12px;font-size:13px;font-weight:600;line-height:1.45;
}
.mm-ok{ background:var(--g-pale);  border:1.5px solid var(--g-mid); color:var(--g-deep);}
.mm-no{ background:var(--pk-pale); border:1.5px solid var(--pk-mid);color:var(--pk-deep);}

/* ════════════════════════════════════
   單間房況卡
════════════════════════════════════ */
.room-card{
  border-radius:var(--r-md);padding:14px 16px;
  margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
  border:1.5px solid transparent;
  transition:transform .15s;
}
.rc-av{
  background:#F4FBF0;border-color:var(--g-mid);
  box-shadow:0 2px 10px rgba(90,138,74,.1);
}
.rc-full{
  background:var(--pk-pale);border-color:var(--pk-mid);
  box-shadow:0 1px 6px rgba(200,80,120,.07);
}
.rc-info{flex:1;}
.rc-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.rc-av  .rc-name{color:var(--g-deep);}
.rc-full.rc-name{color:var(--pk-deep);}
.rc-full .rc-name{color:#904060;}

.rc-badge{
  font-size:11px;font-weight:600;
  padding:3px 10px;border-radius:20px;
  display:inline-block;margin-bottom:5px;
}
.badge-av{background:var(--g-pale);color:var(--g);border:1px solid var(--g-mid);}
.badge-full{background:var(--pk-pale);color:var(--pk-deep);border:1px solid var(--pk-mid);}

.rc-price{font-size:12px;color:var(--gray);}
.rc-full .rc-price{color:var(--gray-mid);}

/* 詢問按鈕（綠色） */
.btn-ask{
  background:linear-gradient(135deg, var(--g-lt), var(--g-deep));
  color:#fff;border:none;border-radius:var(--r-sm);
  padding:9px 15px;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;margin-left:12px;
  flex-shrink:0;font-family:inherit;
  box-shadow:0 3px 10px rgba(90,138,74,.25);
  transition:transform .12s;
}
.btn-ask:active{transform:scale(.95);}

/* ════════════════════════════════════
   包棟查詢結果卡
════════════════════════════════════ */
.bres{
  border-radius:var(--r-md);overflow:hidden;
  margin-bottom:10px;border:1.5px solid transparent;
}
.bres-ok{
  background:linear-gradient(145deg, #FFF6ED, #FFEFD8);
  border-color:var(--or-mid);
  box-shadow:0 3px 14px rgba(224,130,60,.12);
}
.bres-no{
  background:var(--pk-pale);
  border-color:var(--pk-mid);
}
.bres-top{
  display:flex;align-items:flex-start;
  justify-content:space-between;padding:15px 16px 10px;
}
.bres-name{font-size:16px;font-weight:800;margin-bottom:4px;}
.bres-ok .bres-name{color:var(--or-text);}
.bres-no .bres-name{color:#904060;}

.bres-badge{
  font-size:12px;font-weight:700;padding:3px 11px;
  border-radius:20px;display:inline-block;margin-bottom:5px;
}
.bbadge-ok{background:rgba(255,255,255,.75);color:var(--or-text);border:1px solid var(--or-mid);}
.bbadge-no{background:rgba(255,255,255,.6);color:var(--pk-deep);border:1px solid var(--pk-mid);}

.bres-price{font-size:24px;font-weight:800;color:var(--or-text);text-align:right;}
.bres-no .bres-price{color:var(--gray-mid);}
.bres-unit{font-size:13px;font-weight:400;}
.bres-day{font-size:11px;color:var(--text-lt);text-align:right;margin-top:2px;}
.bres-no .bres-day{color:var(--gray-mid);}

.bres-bot{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 14px;
  border-top:1px solid rgba(224,180,120,.25);gap:12px;
}
.bres-info{font-size:12px;color:var(--or-text);line-height:1.7;}
.bres-no .bres-info{color:var(--gray);}

/* 包棟詢問按鈕（橘色） */
.btn-ask-or{
  background:linear-gradient(135deg, #FFB26B, #D07030);
  color:#fff;border:none;border-radius:var(--r-sm);
  padding:9px 16px;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  font-family:inherit;
  box-shadow:0 3px 10px rgba(208,112,48,.28);
  transition:transform .12s;
}
.btn-ask-or:active{transform:scale(.95);}

/* ════════════════════════════════════
   小裝飾 – 天空藍細節
════════════════════════════════════ */
.blue-dot{
  display:inline-block;width:7px;height:7px;
  border-radius:50%;background:var(--bl);
  margin-right:3px;vertical-align:middle;
}
</style>
</head>
<body>

<!-- ════ HERO ════ -->
<div class="hero">
  <div class="hero-deco-bl"></div>
  <img class="hero-meibao" src="./meibao.png" alt="渼寶" onerror="this.onerror=null;this.src='./meibao.png.png';">
  <div class="hero-body">
    <div class="hero-eyebrow">HM VILLA</div>
    <h1>禾渼會館</h1>
    <div class="hero-sub"><span></span>宜蘭親子友善民宿</div>
    <div class="hero-chips">
      <span class="chip ch-g">🌿 親子住宿</span>
      <span class="chip ch-or">☕ 包棟含早餐</span>
      <span class="chip ch-pk">🛁 每房澡盆</span>
    </div>
    <div class="hero-bar">
      <div class="hb-cell">
        <span class="hb-lbl">📞 訂房專線</span>
        <span class="hb-val"><a href="tel:0966536318">0966-536-318</a></span>
      </div>
      <div class="hb-cell">
        <span class="hb-lbl">🏠 包棟方案</span>
        <span class="hb-val">平日 23,000 起</span>
        <span class="hb-note">含早餐・5 間全包</span>
      </div>
    </div>
    <a class="btn-line" href="#">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.03 2 11c0 3.07 1.6 5.8 4.1 7.52L5 22l4.63-1.52C10.35 20.81 11.17 21 12 21c5.52 0 10-4.03 10-9S17.52 2 12 2z" fill="#fff"/></svg>
      加入 LINE 詢問
    </a>
  </div>
</div>

<div class="wrap">
  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn tab-single" id="tab-single" onclick="switchTab('single')">🛏 單間訂房</button>
    <button class="tab-btn" id="tab-bundle" onclick="switchTab('bundle')">🏡 包棟訂房</button>
  </div>

  <!-- ════ 單間訂房 ════ -->
  <div class="section active" id="section-single">
    <div class="card">
      <div class="mascot-hint">
        <div class="mh-label">🐻 渼寶提醒</div>
        <div class="mh-text">選好日期後，就可以查看目前單間房況喔！</div>
      </div>
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        查詢單間空房
      </div>
      <div class="field">
        <label><span class="blue-dot"></span>入住日期</label>
        <input type="date" id="single-date" onchange="updateBadge('single')">
        <span class="day-badge db-no" id="single-badge">請選擇日期</span>
      </div>
      <div class="field">
        <label>🛏 房型需求</label>
        <select id="room-type">
          <option value="all">不限（顯示全部）</option>
          <option value="201">201 四人房</option>
          <option value="202">202 二大一小房</option>
          <option value="203">203 二大二小房</option>
          <option value="301">301 四人房</option>
          <option value="302">302 二大二小房</option>
        </select>
      </div>
      <button class="btn-search" onclick="searchSingle()">🔍 查詢空房</button>
    </div>
    <div id="single-results"></div>
  </div>

  <!-- ════ 包棟訂房 ════ -->
  <div class="section" id="section-bundle">
    <div class="card">
      <div class="mascot-hint">
        <div class="mh-label">🐻 渼寶提醒</div>
        <div class="mh-text">包棟與單間共用房況，避免重複售出，請放心查詢！</div>
      </div>
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        查詢包棟空房
      </div>
      <div class="field">
        <label><span class="blue-dot"></span>入住日期</label>
        <input type="date" id="bundle-date" onchange="updateBadge('bundle')">
        <span class="day-badge db-no" id="bundle-badge">請選擇日期</span>
      </div>
      <div class="field">
        <label>💰 包棟價格</label>
        <div class="bpc">
          <div class="bpc-head">🏡 禾渼會館全館包棟</div>
          <div class="bpc-rows">
            <div class="bpc-row">
              <span class="bpc-lbl">平日（週日～週四）</span>
              <span class="bpc-val">23,000 元</span>
            </div>
            <div class="bpc-row">
              <span class="bpc-lbl">旺日（週五）</span>
              <span class="bpc-val pk">25,000 元</span>
            </div>
            <div class="bpc-row">
              <span class="bpc-lbl">假日（週六）</span>
              <span class="bpc-val hd">30,000 元</span>
            </div>
          </div>
          <div class="bpc-note">✨ 以上均含早餐・5 間房全包</div>
        </div>
      </div>
      <button class="btn-search btn-bundle" onclick="searchBundle()">🔍 查詢包棟</button>
    </div>
    <div id="bundle-results"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   透過 Netlify Function 中繼抓 Apps Script 資料
══════════════════════════════════════════════ */
const PROXY = '/.netlify/functions/availability';

async function loadSheet(sheetName) {
  const res = await fetch(PROXY + '?sheet=' + encodeURIComponent(sheetName));
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

/* 統一轉成 yyyy/mm/dd，處理 ISO 時區問題 */
function normalizeDate(value) {
  if (!value) return '';
  const s = String(value).trim();
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})T/);
  if (iso) return iso[1] + '/' + iso[2] + '/' + iso[3];
  const parts = s.replace(/-/g, '/').split('/');
  if (parts.length === 3)
    return parts[0] + '/' + parts[1].padStart(2,'0') + '/' + parts[2].padStart(2,'0');
  return s;
}

function findRow(data, dsYMD) {
  return data.find(r => normalizeDate(r['日期']) === dsYMD) || null;
}

/* ══════════════════════════════════════════════
   fetchAvail：同時讀三張表，回傳統一結果物件
   回傳 null = 網路錯誤
   回傳 'nodata' = 三張表都找不到此日期
   回傳 { ctrlMode, bundleStatus, rooms }
     ctrlMode    : 正常 / 僅接包棟 / 包棟已訂 / 不可訂
     bundleStatus: available / sold / blocked / unavailable
     rooms       : { 201: 'av'|'full'|'bundleOnly', ... }
══════════════════════════════════════════════ */
function cleanText(value) {
  return String(value || '')
    .replace(/\u00A0/g, '')
    .replace(/[\s　]/g, '')
    .trim();
}

function isAvailableText(value) {
  const v = cleanText(value);
  return v === '可訂' || v === '可預訂' || v === '開放';
}

function isBundleOnlyText(value) {
  const v = cleanText(value);
  return v === '僅接包棟' || v === '只接包棟' || v === '僅可包棟';
}

function isSoldText(value) {
  const v = cleanText(value);
  return v === '已訂' || v === '已客滿' || v === '客滿' || v === '滿房';
}

function isClosedText(value) {
  const v = cleanText(value);
  return v === '不可訂' || v === '不開放' || v === '暫不開放' || v === '維修';
}

/* ══════════════════════════════════════════════
   fetchAvail：同時讀三張表，回傳統一結果物件
   重點：只有「可訂 / 可預訂 / 開放」才算可賣
   其他包含「不可訂、已訂、空白、已客滿」一律關閉
══════════════════════════════════════════════ */
async function fetchAvail(ds) {
  const dsYMD = normalizeDate(ds);
  try {
    const [ctrlData, bundleData, singleData] = await Promise.all([
      loadSheet('房況控制'),
      loadSheet('包棟空房'),
      loadSheet('單間空房'),
    ]);

    const ctrlRow = findRow(ctrlData, dsYMD);
    const bundleRow = findRow(bundleData, dsYMD);
    const singleRow = findRow(singleData, dsYMD);

    if (!ctrlRow && !bundleRow && !singleRow) return 'nodata';

    const ctrlModeRaw = ctrlRow ? (ctrlRow['模式'] || '') : '正常';
    const bundleStatusRaw = bundleRow ? (bundleRow['狀態'] || '') : '';
    const ctrlMode = cleanText(ctrlModeRaw) || '正常';
    const bundleStatusText = cleanText(bundleStatusRaw);

    console.log('[查詢日期]', dsYMD);
    console.log('[房況控制]', ctrlModeRaw, '=>', ctrlMode);
    console.log('[包棟狀態]', bundleStatusRaw, '=>', bundleStatusText);
    console.log('[單間資料]', singleRow);

    const rooms = { '201':'full','202':'full','203':'full','301':'full','302':'full' };

    // 先讀單間表。只有「可訂 / 可預訂 / 開放」才開，其餘全部關。
    if (singleRow) {
      ['201','202','203','301','302'].forEach(id => {
        const raw = singleRow[id];
        if (isAvailableText(raw)) rooms[id] = 'av';
        else if (isBundleOnlyText(raw)) rooms[id] = 'bundleOnly';
        else rooms[id] = 'full'; // 不可訂 / 已訂 / 空白 / 其他文字
        console.log('[單間]', id, raw, '=>', rooms[id]);
      });
    }

    let singleMode = 'normal';

    // 第一優先：房況控制
    if (isBundleOnlyText(ctrlMode)) singleMode = 'bundleOnly';
    else if (cleanText(ctrlMode) === '包棟已訂' || isSoldText(ctrlMode)) singleMode = 'bundleSold';
    else if (isClosedText(ctrlMode)) singleMode = 'closed';
    else {
      // 第二優先：包棟空房狀態
      if (isBundleOnlyText(bundleStatusText)) singleMode = 'bundleOnly';
      else if (isSoldText(bundleStatusText)) singleMode = 'bundleSold';
      else if (isClosedText(bundleStatusText)) singleMode = 'closed';
      else singleMode = 'normal';
    }

    // 非正常模式，單間全部關閉
    if (singleMode !== 'normal') {
      const mark = singleMode === 'bundleOnly' ? 'bundleOnly' : 'full';
      Object.keys(rooms).forEach(id => rooms[id] = mark);
    }

    let bundleStatus = 'unavailable';

    // 包棟判斷
    if (isBundleOnlyText(ctrlMode) || isBundleOnlyText(bundleStatusText)) {
      bundleStatus = 'available';
    } else if (cleanText(ctrlMode) === '包棟已訂' || isSoldText(ctrlMode) || isSoldText(bundleStatusText)) {
      bundleStatus = 'sold';
    } else if (isClosedText(ctrlMode) || isClosedText(bundleStatusText)) {
      bundleStatus = 'unavailable';
    } else {
      // 正常模式：單間只要任一房不是可訂，就不能包棟
      const anyRoomNotAvailable = Object.values(rooms).some(v => v !== 'av');
      if (anyRoomNotAvailable) bundleStatus = 'singleBooked';
      else if (isAvailableText(bundleStatusText) || bundleStatusText === '') bundleStatus = 'available';
      else bundleStatus = 'unavailable';
    }

    console.log('[結果] singleMode:', singleMode, 'rooms:', rooms, 'bundleStatus:', bundleStatus);
    return { ctrlMode, singleMode, bundleStatus, rooms };

  } catch(e) {
    console.error('fetchAvail:', e);
    return null;
  }
}

/* ══ 房間與價格定義 ══ */
const ROOMS_DEF = [
  { id:'201', name:'201 四人房',    wd:3500, hd:4500 },
  { id:'202', name:'202 二大一小房', wd:2500, hd:3500 },
  { id:'203', name:'203 二大二小房', wd:2900, hd:3900 },
  { id:'301', name:'301 四人房',    wd:4000, hd:5000 },
  { id:'302', name:'302 二大二小房', wd:2900, hd:3900 },
];
const BUNDLE_P = { wd:23000, pk:25000, hd:30000 };

function dayType(ds){
  const d = new Date(ds+'T00:00:00').getDay();
  if(d===6) return 'hd'; if(d===5) return 'pk'; return 'wd';
}
function dayLabel(t){ return {wd:'平日',pk:'旺日',hd:'假日'}[t]; }
function fmtDate(ds){
  const d=new Date(ds+'T00:00:00');
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}

function updateBadge(which){
  const val=document.getElementById(which+'-date').value;
  const el=document.getElementById(which+'-badge');
  if(!val){el.className='day-badge db-no';el.textContent='請選擇日期';return;}
  const t=dayType(val);
  if(t==='hd'){el.className='day-badge db-hd';el.textContent='🟠 假日（週六）';}
  else if(t==='pk'){el.className='day-badge db-pk';el.textContent='💙 旺日（週五）';}
  else{el.className='day-badge db-wd';el.textContent='🌿 平日（週日～週四）';}
}

function switchTab(tab){
  ['single','bundle'].forEach(t=>{
    document.getElementById('tab-'+t).classList.remove('tab-single','tab-bundle');
    document.getElementById('section-'+t).classList.remove('active');
  });
  document.getElementById('tab-'+tab).classList.add(tab==='single'?'tab-single':'tab-bundle');
  document.getElementById('section-'+tab).classList.add('active');
}

/* ══════════════════════════════════════════════
   searchSingle
══════════════════════════════════════════════ */
async function searchSingle(){
  const dv=document.getElementById('single-date').value;
  const area=document.getElementById('single-results');
  if(!dv){area.innerHTML=warn();return;}
  area.innerHTML=loading();

  const data=await fetchAvail(dv);
  if(!data){area.innerHTML=errMsg();return;}
  if(data==='nodata'){area.innerHTML=noDataMsg();return;}

  const {singleMode, rooms}=data;
  const t=dayType(dv), dl=dayLabel(t), dateLabel=fmtDate(dv);
  const rv=document.getElementById('room-type').value;
  const list=rv==='all'?ROOMS_DEF:ROOMS_DEF.filter(r=>r.id===rv);

  let html=`<div class="results-hdr">${dateLabel}（${dl}）單間查詢結果</div>`;

  /* 非正常模式：整體提示 + 全房顯示 */
  if (singleMode === 'bundleOnly') {
    html+=`<div class="mascot-msg mm-no">🏡 渼寶說：此日期僅開放包棟，不提供單間訂房。</div>`;
    list.forEach(r=>{
      const price=(t!=='wd')?r.hd:r.wd;
      html+=`<div class="room-card rc-full"><div class="rc-info">
        <div class="rc-name">${r.name}</div>
        <span class="rc-badge badge-full">🏡 此日期僅開放包棟，不提供單間訂房</span>
        <div class="rc-price">${dl} ${price.toLocaleString()} 元／晚</div>
      </div></div>`;
    });
  } else if (singleMode === 'bundleSold') {
    html+=`<div class="mascot-msg mm-no">🌸 渼寶說：此日期包棟已訂，單間不開放。</div>`;
    list.forEach(r=>{
      const price=(t!=='wd')?r.hd:r.wd;
      html+=`<div class="room-card rc-full"><div class="rc-info">
        <div class="rc-name">${r.name}</div>
        <span class="rc-badge badge-full">🌸 此日期包棟已訂，單間不開放</span>
        <div class="rc-price">${dl} ${price.toLocaleString()} 元／晚</div>
      </div></div>`;
    });
  } else if (singleMode === 'closed') {
    html+=`<div class="mascot-msg mm-no">🌸 渼寶說：此日期暫不開放訂房，請加入 LINE 詢問。</div>`;
    list.forEach(r=>{
      const price=(t!=='wd')?r.hd:r.wd;
      html+=`<div class="room-card rc-full"><div class="rc-info">
        <div class="rc-name">${r.name}</div>
        <span class="rc-badge badge-full">🚫 此日期暫不開放訂房</span>
        <div class="rc-price">${dl} ${price.toLocaleString()} 元／晚</div>
      </div></div>`;
    });
  } else {
    /* 正常模式：依各房狀態顯示 */
    const hasAny=list.some(r=>rooms[r.id]==='av');
    html+=`<div class="mascot-msg ${hasAny?'mm-ok':'mm-no'}">${
      hasAny?'🎉 渼寶說：太好了，這天還有空房！':'🌸 渼寶說：這天單間已無空房，可換個日期或詢問包棟。'
    }</div>`;
    list.forEach(r=>{
      const price=(t!=='wd')?r.hd:r.wd;
      const st=rooms[r.id];
      if(st==='av'){
        const msg=encodeURIComponent('您好，我想詢問【'+dateLabel+'】【'+r.name+'】是否還有空房？');
        html+=`<div class="room-card rc-av"><div class="rc-info">
          <div class="rc-name">${r.name}</div>
          <span class="rc-badge badge-av">✅ 尚有空房・剩餘 1 間</span>
          <div class="rc-price">${dl} ${price.toLocaleString()} 元／晚</div>
        </div><button class="btn-ask" onclick="openLine('${msg}')">我要詢問</button></div>`;
      } else if(st==='bundleOnly'){
        html+=`<div class="room-card rc-full"><div class="rc-info">
          <div class="rc-name">${r.name}</div>
          <span class="rc-badge badge-full">🏡 此日期僅開放包棟，不提供單間訂房</span>
          <div class="rc-price">${dl} ${price.toLocaleString()} 元／晚</div>
        </div></div>`;
      } else {
        html+=`<div class="room-card rc-full"><div class="rc-info">
          <div class="rc-name">${r.name}</div>
          <span class="rc-badge badge-full">🌸 已客滿</span>
          <div class="rc-price">${dl} ${price.toLocaleString()} 元／晚</div>
        </div></div>`;
      }
    });
  }

  area.innerHTML=html;
  area.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ══════════════════════════════════════════════
   searchBundle
══════════════════════════════════════════════ */
async function searchBundle(){
  const dv=document.getElementById('bundle-date').value;
  const area=document.getElementById('bundle-results');
  if(!dv){area.innerHTML=warn();return;}
  area.innerHTML=loading();

  const data=await fetchAvail(dv);
  if(!data){area.innerHTML=errMsg();return;}
  if(data==='nodata'){area.innerHTML=noDataMsg();return;}

  const {bundleStatus}=data;
  const t=dayType(dv), dl=dayLabel(t), dateLabel=fmtDate(dv);
  const price=BUNDLE_P[t];
  const lineMsg=encodeURIComponent('您好，我想詢問【'+dateLabel+'】禾渼會館包棟是否還有空房？');

  let html=`<div class="results-hdr">${dateLabel}（${dl}）包棟查詢結果</div>`;

  if(bundleStatus==='available'){
    html+=`<div class="mascot-msg mm-ok">🎉 渼寶說：太好了，這天可以包棟！</div>`;
    html+=`<div class="bres bres-ok">
      <div class="bres-top">
        <div><div class="bres-name">🏡 禾渼會館包棟</div>
        <span class="bres-badge bbadge-ok">🎉 可包棟</span></div>
        <div><div class="bres-price">${price.toLocaleString()}<span class="bres-unit"> 元</span></div>
        <div class="bres-day">${dl}・每晚</div></div>
      </div>
      <div class="bres-bot">
        <div class="bres-info">🏠 5 間房全包・含早餐<br>📞 <a href="tel:0966536318" style="color:var(--or-text);font-weight:700;">0966-536-318</a></div>
        <button class="btn-ask-or" onclick="openLine('${lineMsg}')">詢問包棟</button>
      </div>
    </div>`;

  } else {
    const msgMap = {
      sold:         { mascot:'🌸 渼寶說：這天包棟已售出，可以換個日期試試。',  badge:'🌸 此日包棟已售出',              bot:false },
      singleBooked: { mascot:'🌸 渼寶說：這天已有單間訂房，無法包棟，請加入 LINE 詢問。', badge:'🌸 此日已有單間訂房，無法包棟', bot:true  },
      unavailable:  { mascot:'🚫 渼寶說：此日期暫不開放訂房，請加入 LINE 詢問。', badge:'🚫 此日期暫不開放訂房',           bot:true  },
    };
    const m = msgMap[bundleStatus] || msgMap['unavailable'];
    html+=`<div class="mascot-msg mm-no">${m.mascot}</div>`;
    html+=`<div class="bres bres-no">
      <div class="bres-top">
        <div><div class="bres-name">🏡 禾渼會館包棟</div>
        <span class="bres-badge bbadge-no">${m.badge}</span></div>
        <div><div class="bres-price">${price.toLocaleString()}<span class="bres-unit"> 元</span></div>
        <div class="bres-day">${dl}・每晚</div></div>
      </div>
      ${m.bot ? `<div class="bres-bot">
        <div class="bres-info" style="color:var(--pk-deep);">${m.badge}</div>
        <button class="btn-ask-or" onclick="openLine('${lineMsg}')">加入 LINE 詢問</button>
      </div>` : ''}
    </div>`;
  }

  area.innerHTML=html;
  area.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function warn(){ return '<div class="card" style="text-align:center;color:var(--or-text);font-size:14px;padding:18px;">⚠️ 請先選擇入住日期</div>'; }
function loading(){ return '<div style="text-align:center;padding:28px;color:var(--gray);font-size:14px;">🔍 查詢中，請稍候…</div>'; }
function errMsg(){ return '<div class="card" style="text-align:center;padding:20px;"><div style="font-size:22px;margin-bottom:8px;">🐻</div><div style="font-size:14px;color:var(--pk-deep);font-weight:600;margin-bottom:12px;">目前無法讀取空房表，請加入 LINE 詢問</div><a href="#" class="btn-line" style="font-size:13px;padding:9px 20px;">加入 LINE 詢問</a></div>'; }
function noDataMsg(){ return '<div class="card" style="text-align:center;padding:20px;"><div style="font-size:22px;margin-bottom:8px;">🐻</div><div style="font-size:14px;color:var(--pk-deep);font-weight:600;margin-bottom:12px;">此日期尚未建立房況資料，請加入 LINE 詢問</div><a href="#" class="btn-line" style="font-size:13px;padding:9px 20px;">加入 LINE 詢問</a></div>'; }
function openLine(msg){ window.open('https://line.me/R/msg/text/?'+msg,'_blank'); }

const t0=new Date();
const ymd=t0.getFullYear()+'-'+String(t0.getMonth()+1).padStart(2,'0')+'-'+String(t0.getDate()).padStart(2,'0');
document.getElementById('single-date').min=ymd;
document.getElementById('bundle-date').min=ymd;
</script>
</body>
</html>
